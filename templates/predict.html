{% extends "base.html" %}
{% block title %}性能预测 - 石蜡配方设计系统{% endblock %}
{% block content %}
<h2 class="mb-3"><i class="bi bi-graph-up"></i> 性能预测</h2>
<p class="text-muted mb-3">选择原料并调整比例，实时查看混合后的性能指标。</p>

<div class="row g-4">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-bold"><i class="bi bi-sliders"></i> 原料配比</div>
            <div class="card-body" id="mixtureBuilder">
                <p class="text-muted text-center" id="emptyHint">请添加至少2种原料</p>
                <div id="mixtureList"></div>
                <button class="btn btn-sm btn-outline-primary mt-2" onclick="addMixtureMaterial()"><i class="bi bi-plus"></i> 添加原料</button>
                <hr>
                <div class="d-flex justify-content-between">
                    <span>比例总和:</span>
                    <span class="fw-bold" id="predRatioSum">0%</span>
                </div>
                <div class="progress mt-2" style="height: 20px;" id="ratioProgress"></div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-bold"><i class="bi bi-bar-chart"></i> 预测结果</div>
            <div class="card-body" id="predictionResult">
                <p class="text-muted text-center">调整比例后自动计算</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/predict-page.js') }}"></script>
{% endblock %}
