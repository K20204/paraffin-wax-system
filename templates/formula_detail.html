{% extends "base.html" %}
{% block title %}配方详情 - 石蜡配方设计系统{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0"><i class="bi bi-file-text"></i> <span id="formulaNameLabel">配方详情</span></h2>
    <div>
        <button class="btn btn-success me-2" onclick="saveFormula()"><i class="bi bi-check-lg"></i> 保存</button>
        <a href="/formulas" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> 返回列表</a>
    </div>
</div>

<div class="row g-3">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span class="fw-bold">配方信息</span>
                <button class="btn btn-sm btn-outline-primary" onclick="addItem()"><i class="bi bi-plus"></i> 添加原料</button>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">配方名称</label>
                    <input type="text" class="form-control" id="fName">
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="fDescription" rows="2"></textarea>
                </div>
                <hr>
                <table class="table table-sm" id="itemsTable">
                    <thead><tr><th>原料</th><th style="width:120px">比例 (%)</th><th style="width:60px"></th></tr></thead>
                    <tbody></tbody>
                </table>
                <div class="text-end text-muted small">总和: <span id="ratioSum" class="fw-bold">0</span>%</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm mb-3" id="predictedCard" style="display:none">
            <div class="card-header bg-white fw-bold"><i class="bi bi-graph-up"></i> 预测性能</div>
            <div class="card-body" id="predictedProps"></div>
        </div>
        <div class="card shadow-sm" id="costCard" style="display:none">
            <div class="card-header bg-white fw-bold"><i class="bi bi-currency-dollar"></i> 成本估算</div>
            <div class="card-body" id="totalCost"></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/formula-detail.js') }}"></script>
{% endblock %}
