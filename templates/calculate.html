{% extends "base.html" %}
{% block title %}配比计算 - 石蜡配方设计系统{% endblock %}
{% block content %}
<h2 class="mb-3"><i class="bi bi-calculator"></i> 配比计算</h2>
<p class="text-muted mb-3">选择原料并输入目标属性值，系统自动计算最优配比。</p>

<div class="row g-4">
    <div class="col-md-5">
        <div class="card shadow-sm mb-3">
            <div class="card-header bg-white fw-bold"><i class="bi bi-box"></i> 选择原料</div>
            <div class="card-body" id="materialsCheckList">
                <p class="text-muted text-center" id="matLoading">加载中...</p>
            </div>
        </div>
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-bold"><i class="bi bi-lock"></i> 锁定比例（可选）</div>
            <div class="card-body" id="lockedRatios"></div>
        </div>
    </div>
    <div class="col-md-7">
        <div class="card shadow-sm mb-3">
            <div class="card-header bg-white fw-bold"><i class="bi bi-bullseye"></i> 目标属性</div>
            <div class="card-body" id="targetInputs">
                <p class="text-muted text-center" id="targetLoading">加载中...</p>
            </div>
        </div>
        <button class="btn btn-success btn-lg w-100 mb-3" onclick="calculateRatio()"><i class="bi bi-calculator"></i> 计算配比</button>
        <div class="card shadow-sm" id="resultCard" style="display:none">
            <div class="card-header bg-white fw-bold"><i class="bi bi-bar-chart"></i> 计算结果</div>
            <div class="card-body" id="ratioResult"></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/calculate-page.js') }}"></script>
{% endblock %}
